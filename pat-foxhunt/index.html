<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey Patryk 🥊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0d1b2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }
    .label {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 12px;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 177.78%; /* 9:16 */
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">A message from Steve</p>
    <div class="video-wrap">
      <iframe
        src="https://drive.google.com/file/d/1L3lCeu7rE2p9rYk3yFddaJQ-cXSXbDgC/preview"
        allow="autoplay"
        allowfullscreen>
      </iframe>
    </div>
    <p class="footer">RealApproved.ca &nbsp;·&nbsp; Steve Hamoen</p>
  </div>
</body>
</html>
